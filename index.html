<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TPMConnect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;
  --bg2:#111111;
  --bg3:#1a1a1a;
  --bg4:#222222;
  --yellow:#F5C518;
  --yellow2:#FFD700;
  --yellow-dim:#3d3000;
  --red:#E84040;
  --green:#22C55E;
  --orange:#F59E0B;
  --gray:#888;
  --gray2:#555;
  --border:#2a2a2a;
  --border2:#333;
  --text:#F0F0F0;
  --stripe: repeating-linear-gradient(135deg, var(--yellow) 0 10px, #0a0a0a 10px 20px);
  --font-head:'Oswald',-apple-system,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,monospace;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:19px}
 
.hazard{height:7px;background:var(--stripe);background-size:34px 34px}
 
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;height:74px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{color:#fff;font-family:var(--font-head);font-size:26px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;display:flex;align-items:center;gap:10px}
.logo-dot{width:18px;height:18px;border-radius:4px;background:var(--stripe);background-size:10px 10px;flex-shrink:0}
.logo span{color:var(--yellow)}
.sync-indicator{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--gray)}
.sync-dot{width:10px;height:10px;border-radius:50%;background:var(--gray2);flex-shrink:0;transition:background .3s}
.sync-dot.live{background:var(--green);animation:blink 2s infinite}
.sync-dot.error{background:var(--red)}
.sync-dot.syncing{background:var(--yellow);animation:blink .6s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.topbar-tabs{display:flex;gap:3px}
.topbar-tab{background:transparent;border:none;color:var(--gray);font-size:13px;font-weight:600;padding:8px 14px;border-radius:9px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .15s}
.topbar-tab svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.topbar-tab.active{color:var(--yellow);background:rgba(245,197,24,.1)}
 
.view{display:none;padding:20px;max-width:820px;margin:0 auto;padding-bottom:60px}
.view.active{display:block}
 
.card{background:var(--bg2);border-radius:16px;padding:22px;margin-bottom:14px;border:1px solid var(--border)}
.card-title{font-family:var(--font-head);font-size:15px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
 
label.lbl{display:block;font-size:15px;font-weight:500;color:var(--gray);margin-bottom:6px;margin-top:14px}
label.lbl:first-child{margin-top:0}
select,input[type=text],input[type=password]{
  width:100%;padding:15px 18px;border:1px solid var(--border2);border-radius:11px;
  background:var(--bg3);color:var(--text);font-size:18px;appearance:none;
  transition:border-color .15s
}
select:focus,input:focus{outline:none;border-color:var(--yellow)}
select:disabled{background:var(--bg2);color:var(--gray2)}
option{background:var(--bg3)}
 
 
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:17px 24px;border-radius:11px;font-size:17px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;border:none;transition:all .15s;width:100%}
.btn-primary{background:var(--yellow);color:#000}
.btn-primary:hover{background:var(--yellow2)}
.btn-primary:disabled{background:var(--gray2);color:#666;cursor:not-allowed}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}
.btn-secondary:hover{border-color:var(--gray)}
.btn-danger{background:rgba(232,64,64,.1);color:var(--red);border:1px solid rgba(232,64,64,.3)}
.btn-sm{padding:10px 18px;font-size:14px;width:auto;border-radius:9px}
 
.machine-header{background:var(--bg3);border:1px solid var(--border2);border-radius:16px;padding:22px;margin-bottom:14px;position:relative;overflow:hidden}
.machine-header::before{content:'';position:absolute;top:0;left:0;right:0;height:7px;background:var(--stripe);background-size:28px 28px}
.machine-header .cat-tag{display:inline-block;background:var(--yellow-dim);color:var(--yellow);font-size:13px;font-weight:700;padding:5px 13px;border-radius:20px;margin-bottom:9px;letter-spacing:.5px;text-transform:uppercase}
.machine-header h2{font-family:var(--font-head);font-size:30px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px;color:#fff}
.machine-header p{color:var(--gray);font-size:16px}
 
.check-row{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border)}
.check-row:last-child{border-bottom:none}
.check-q{font-size:17px;flex:1;padding-right:14px;line-height:1.4;color:var(--text)}
.radio-pair{display:flex;gap:8px;flex-shrink:0}
.radio-btn{padding:10px 16px;border-radius:9px;border:1px solid var(--border2);font-size:16px;font-weight:600;cursor:pointer;background:var(--bg3);color:var(--gray);transition:all .15s}
.radio-btn:hover{border-color:var(--gray)}
.radio-btn.ok-active{background:rgba(34,197,94,.12);border-color:#22C55E;color:#22C55E}
.radio-btn.ko-active{background:rgba(232,64,64,.12);border-color:var(--red);color:var(--red)}
 
.progress-wrap{margin-top:16px}
.progress-bar{height:6px;background:var(--border2);border-radius:3px;overflow:hidden;margin-bottom:7px}
.progress-fill{height:100%;background:var(--yellow);border-radius:3px;transition:width .3s}
.progress-label{font-size:14px;color:var(--gray)}
 
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:14px;font-weight:600}
.badge-green{background:rgba(34,197,94,.12);color:#22C55E}
.badge-red{background:rgba(232,64,64,.12);color:var(--red)}
.badge-yellow{background:var(--yellow-dim);color:var(--yellow)}
.badge-orange{background:rgba(245,158,11,.12);color:var(--orange)}
.badge-gray{background:var(--bg3);color:var(--gray);border:1px solid var(--border2)}
 
.machine-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:14px}
.machine-tile{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:17px;cursor:pointer;transition:all .2s}
.machine-tile:hover{border-color:var(--border2)}
.machine-tile.done{border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.04)}
.machine-tile.issue{border-color:rgba(232,64,64,.4);background:rgba(232,64,64,.04);animation:pulse 1.5s infinite}
.machine-tile.urgent{border-color:rgba(245,158,11,.5);background:rgba(245,158,11,.05)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.tile-name{font-size:17px;font-weight:600;margin-bottom:5px;color:#fff}
.tile-info{font-size:14px;color:var(--gray);display:flex;align-items:center;gap:5px}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-green{background:var(--green)}
.dot-red{background:var(--red)}
.dot-gray{background:var(--gray2)}
.dot-orange{background:var(--orange)}
 
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-bottom:14px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px;text-align:center}
.stat-num{font-family:var(--font-mono);font-size:36px;font-weight:700;font-variant-numeric:tabular-nums}
.stat-lbl{font-size:13px;color:var(--gray);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
 
.alert-banner{background:rgba(232,64,64,.08);border:1px solid rgba(232,64,64,.3);border-radius:13px;padding:16px 18px;margin-bottom:14px;font-size:16px;color:#f87171;display:flex;align-items:flex-start;gap:10px}
.alert-banner svg{flex-shrink:0;margin-top:1px;width:18px;height:18px}
 
.warn-banner{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);border-radius:13px;padding:16px 18px;margin-bottom:14px;font-size:16px;color:var(--orange);display:flex;align-items:flex-start;gap:10px}
.warn-banner svg{flex-shrink:0;margin-top:1px;width:18px;height:18px}
 
.info-banner{background:rgba(245,197,24,.06);border:1px solid rgba(245,197,24,.2);border-radius:12px;padding:14px 18px;font-size:16px;color:var(--yellow);margin-bottom:14px}
 
.scan-banner{background:rgba(34,197,94,.06);border:1px dashed rgba(34,197,94,.35);border-radius:13px;padding:18px;margin-bottom:14px;font-size:16px;color:#4ade80;display:flex;align-items:center;gap:12px}
.scan-banner svg{flex-shrink:0;width:26px;height:26px}
 
.tbl{width:100%;border-collapse:collapse;font-size:16px}
.tbl th{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border2);font-weight:700;color:var(--gray);font-size:13px;text-transform:uppercase;letter-spacing:.6px;font-family:var(--font-head)}
.tbl td{padding:13px 12px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--bg3)}
.mono{font-family:var(--font-mono)}
.tbl-fixed{table-layout:fixed}
.tbl-fixed td{overflow:hidden}
.cell-clip{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;max-width:100%}
.cell-wrap{overflow-wrap:break-word;word-break:break-word}
 
.success-screen{text-align:center;padding:56px 26px}
.success-icon{width:92px;height:92px;background:rgba(34,197,94,.1);border:2px solid rgba(34,197,94,.3);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.success-icon svg{width:44px;height:44px;stroke:var(--green);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
 
.lock-screen{display:flex;align-items:center;justify-content:center;min-height:60vh}
.lock-box{width:100%;max-width:380px;text-align:center}
.lock-icon{width:74px;height:74px;background:var(--yellow-dim);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;border:1px solid rgba(245,197,24,.2)}
.lock-icon svg{width:32px;height:32px;stroke:var(--yellow);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
 
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:28px;width:100%;max-width:400px;text-align:center}
.modal-box.wide{max-width:520px;text-align:left}
 
.section-title{font-family:var(--font-head);font-size:28px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;color:#fff}
.section-sub{font-size:16px;color:var(--gray);margin-bottom:18px}
.hint{font-size:14px;color:var(--gray2);margin-top:7px;padding:10px 14px;background:var(--bg3);border-radius:9px;border:1px solid var(--border)}
 
.live-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(34,197,94,.1);color:var(--green);font-size:13px;font-weight:700;padding:4px 11px;border-radius:20px;border:1px solid rgba(34,197,94,.2)}
.live-badge::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 1.5s infinite}
 
.spinner{width:17px;height:17px;border:3px solid var(--border2);border-top-color:var(--yellow);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
 
.toggle-link{background:none;border:none;color:var(--yellow);font-size:15px;font-weight:600;cursor:pointer;padding:0;text-decoration:underline}
 
.week-group{margin-bottom:18px;border:1px solid var(--border);border-radius:14px;overflow:hidden}
.week-group-head{background:var(--bg3);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.week-group-head:hover{background:var(--bg4)}
.week-group-title{font-family:var(--font-head);font-size:17px;font-weight:600;color:#fff;text-transform:uppercase;letter-spacing:.3px}
.week-group-body{padding:0 4px}
 
</style>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<body>

<div class="view active" id="view-operator"><div id="op-content"></div></div>

<!-- Modal code-barres -->
<div class="modal-overlay" id="bc-modal">
  <div class="modal-box">
    <div id="bc-modal-title" style="font-size:20px;font-weight:700;margin-bottom:4px;color:#fff"></div>

      <button class="btn btn-primary btn-sm" style="flex:1" onclick="downloadBC()">Télécharger</button>
      <button class="btn btn-secondary btn-sm" style="flex:1" onclick="closeBC()">Fermer</button>
    </div>
  </div>
</div>
 
<!-- Pop-up rappel maintenance au démarrage -->
<div class="modal-overlay" id="startup-modal">
  <div class="modal-box wide">
    <div class="lock-icon" style="margin:0 0 14px;background:var(--yellow-dim)">
      <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    </div>
    <div class="section-title">Maintenance premier niveau à faire</div>
    <div class="section-sub">Cette semaine (<span id="su-weeklabel"></span>), certaines machines n'ont pas encore été contrôlées :</div>

<script>
// ════════════════════════════════════════════
// CONFIG — URL de ton Google Apps Script déployé (NE PAS CHANGER)
// ════════════════════════════════════════════
const SHEET_API_URL = 'https://script.google.com/macros/s/AKfycbxt5aNaPUN80LsmSKBBX6mcrj1ABVFYE7A0-IUSPZTdNOAluNwRRj5pBWZscIUBwySrig/exec';
const POLL_INTERVAL = 4000; // 4s — fréquence de vérification des mises à jour
// URL du dossier où sont déposés les PDF de fiches d'instruction.
// Laisse '' pour utiliser le dossier de cette page (par défaut). Si tes liens donnent une 404,
// remplis ici l'URL complète du dossier (avec / à la fin), ex: 'https://monsite.com/fiches/'
const PDF_FOLDER_URL = '';
 
// ════════════════════════════════════════════
// GESTION SEMAINE (réinitialisation dimanche soir / minuit -> lundi)
// ════════════════════════════════════════════
function mondayOf(d){
  const x=new Date(d);
  const day=x.getDay(); // 0=dim..6=sam
  const diff=x.getDate()-day+(day===0?-6:1);
  x.setDate(diff);
  x.setHours(0,0,0,0);
  return x;
}
function currentWeekKey(){
  const m=mondayOf(new Date());
  return m.getFullYear()+'-'+String(m.getMonth()+1).padStart(2,'0')+'-'+String(m.getDate()).padStart(2,'0');
}
function weekLabel(key){
  const d=new Date(key+'T00:00:00');
  const end=new Date(d); end.setDate(d.getDate()+6);
  const fmt=x=>x.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});
  return fmt(d)+' au '+fmt(end);
}
// Jour ISO : 1=lundi ... 7=dimanche
function isoDay(){ const d=new Date().getDay(); return d===0?7:d; }
// Rappel "dépêchez-vous" actif dès jeudi (jour 4) jusqu'à dimanche (jour 7)
function isUrgentPeriod(){ return isoDay()>=4; }
 
function today(){ return new Date().toLocaleDateString('fr-FR'); }
function nowTime(){ return new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }
function fmtDuration(sec){
  if(sec==null) return '—';
  const m=Math.floor(sec/60), s=sec%60;
  return m>0 ? `${m} min ${String(s).padStart(2,'0')} s` : `${s} s`;
}
 
// Icône par catégorie de machine — repère visuel rapide sur poste industriel
const CAT_ICON = { 'Presse':'', 'Fraisage':'', 'Tournage':'', 'Ligne':'' };
function catIcon(cat){ return CAT_ICON[cat] || ''; }
 
function defaultData(){
  return {
    machines:[
      {id:'PR-01',name:'Presse 01',cat:'Presse'},
      {id:'PR-02',name:'Presse 02',cat:'Presse'},
      {id:'PR-03',name:'Presse 03',cat:'Presse'},
      {id:'FR-01',name:'Fraiseuse 01',cat:'Fraisage'},
      {id:'FR-02',name:'Fraiseuse 02',cat:'Fraisage'},
      {id:'TO-01',name:'Tour 01',cat:'Tournage'},
      {id:'LG-01',name:'Ligne Assemblage A',cat:'Ligne'},
      {id:'LG-02',name:'Ligne Assemblage B',cat:'Ligne'},
    ],
    operators:{
      'Presse':['Marie D.','Karim B.','Luc M.','Sofia A.'],
      'Fraisage':['Yann T.','Pierre C.','Amine R.'],
      'Tournage':['Sophie L.','Marc B.'],
      'Ligne':['Amine R.','Nadia F.','Jean P.','Karim B.'],
    },
    questions:{
      'Presse':["Niveau d'huile hydraulique","Contrôle des barrières immatérielles","État des joints et garnitures","Pression de serrage (manomètre)","Nettoyage du bac de récupération"],
      'Fraisage':["Niveau d'huile de broche","État des fraises (usure visible)","Serrage des brides","Lubrification des glissières"],
      'Tournage':["État de la pointe de centrage","Niveau de liquide de coupe","Mandrin : usure des mâchoires"],
      'Ligne':["Capteurs de présence opérationnels","Convoyeur : tension de courroie","Arrêts d'urgence testés","Vérification des préhenseurs"],
    },
    history:[],       // archive complète, jamais supprimée
    weekKey: currentWeekKey(),
    weekRecords:{},    // { machineId: record } pour la semaine en cours
    instructionSheets:{} // { machineId: {fileName, addedAt} } — le PDF lui-même vit à côté du fichier HTML
  };
}
 
let APP = defaultData();
let lastKnownJSON = '';
let isOnline = false;
let initialSyncDone = false;
let initialSyncError = false;
let startupModalShown = false;
 
function rolloverWeekIfNeeded(){
  const wk=currentWeekKey();
  if(APP.weekKey!==wk){
    APP.weekKey=wk;
    APP.weekRecords={};
  }
}
 
// ════════════════════════════════════════════
// SYNC ENGINE — Google Sheets via Apps Script
// ════════════════════════════════════════════
function setSyncState(state){
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-label');
  if(!dot) return;
  dot.className='sync-dot';
  if(state==='live'){ dot.classList.add('live'); lbl.textContent='Sheet connecté'; isOnline=true; }
  else if(state==='syncing'){ dot.classList.add('syncing'); lbl.textContent='Synchro...'; }
  else if(state==='error'){ dot.classList.add('error'); lbl.textContent='Hors-ligne'; isOnline=false; }
  else { lbl.textContent='Connexion...'; }
}
 
async function fetchFromSheet(){
  try{
    const res = await fetch(SHEET_API_URL + '?t=' + Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    if(data && Object.keys(data).length > 0 && data.machines){
      const newJSON = JSON.stringify(data);
      const firstLoad = !initialSyncDone;
      if(newJSON !== lastKnownJSON){
        const changed = lastKnownJSON !== '';
        APP = data;
        if(!APP.weekKey) APP.weekKey = currentWeekKey();
        if(!APP.weekRecords) APP.weekRecords = {};
        if(!APP.instructionSheets) APP.instructionSheets = {};
        rolloverWeekIfNeeded();
        lastKnownJSON = newJSON;
        initialSyncDone = true;
        rerenderActiveView();
        if(changed) showSyncFlash();
        maybeShowStartupModal();
      } else if(firstLoad){
        initialSyncDone = true;
        rerenderActiveView();
        maybeShowStartupModal();
      }
      setSyncState('live');
      return true;
    } else {
      // Sheet vide -> on initialise avec les données par défaut
      lastKnownJSON = JSON.stringify(APP);
      initialSyncDone = true;
      await pushToSheet();
      rerenderActiveView();
      setSyncState('live');
      maybeShowStartupModal();
      return true;
    }
  }catch(err){
    setSyncState('error');
    if(!initialSyncDone){ initialSyncError = true; rerenderActiveView(); }
    return false;
  }
}
 
async function pushToSheet(){
  setSyncState('syncing');
  try{
    await fetch(SHEET_API_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body: JSON.stringify(APP)
    });
    lastKnownJSON = JSON.stringify(APP);
    setSyncState('live');
  }catch(err){
    setSyncState('error');
  }
}
 
function saveData(){
  pushToSheet();
}
 
// Récupère la toute dernière version du Sheet, applique le changement par-dessus,
// puis pousse le résultat. Réduit fortement le risque que deux appareils
// s'écrasent mutuellement en écrivant en même temps.
async function syncedWrite(mutator){
  setSyncState('syncing');
  await fetchFromSheet();
  rolloverWeekIfNeeded();
  mutator();
  await pushToSheet();
  rerenderActiveView();
}
 
function showSyncFlash(){
  const lbl=document.getElementById('sync-label');
  if(lbl){
    const prev=lbl.textContent;
    lbl.textContent='Mis à jour';
    lbl.style.color='var(--yellow)';
    setTimeout(()=>{ lbl.textContent=prev; lbl.style.color=''; },1200);
  }
}
 
function rerenderActiveView(){
  const cv=document.querySelector('.view.active');
  if(!cv) return;
  if(cv.id==='view-dashboard') renderDashboard();
  else if(cv.id==='view-admin' && !adminState.locked) renderAdmin();
  else if(cv.id==='view-operator'){
    // On rafraîchit tant que l'opérateur n'a pas vraiment commencé à remplir
    const noProgress = !opState.operatorName && Object.keys(opState.answers).length===0 && !opState.submitted;
    if(noProgress) renderOperator();
  }
}

// SCAN DOUCHETTE — capture clavier globale (code-barres = ID machine)
// ════════════════════════════════════════════
let scanBuffer='';
let scanTimer=null;
document.addEventListener('keydown', function(e){
  if(e.key==='Enter'){
    const code=scanBuffer.trim();
    scanBuffer='';
    if(code.length>=2) handleScan(code);
    return;
  }
  if(e.key.length===1){ scanBuffer+=e.key; }
  clearTimeout(scanTimer);
  scanTimer=setTimeout(()=>{ scanBuffer=''; },350);
});
function extractMachineCode(raw){
  const code=(raw||'').trim();
  // QR contenant une URL complète (ex: https://.../tpmconnect/?machine=PR-01)
  try{
    const u=new URL(code);
    const p=u.searchParams.get('machine');
    if(p) return p;
  }catch(e){ /* pas une URL complète, on continue */ }
  // Chaîne contenant "machine=XXX" sans être une URL valide
  const m2=code.match(/machine=([^&\s]+)/i);
  if(m2) return decodeURIComponent(m2[1]);
  // Sinon on considère que c'est directement l'ID de la machine
  return code;
}
// Ne garde que lettres et chiffres, en minuscule — insensible aux tirets/symboles
// mal transcrits par une douchette configurée dans un autre agencement clavier (QWERTY/AZERTY)
function normalizeCode(s){
  return (s||'').toString().toLowerCase().replace(/[^a-z0-9]/g,'');
}
// ════════════════════════════════════════════
// SÉCURITÉ SCAN — filet de rattrapage clavier AZERTY/QWERTY
// Quand l'état Majuscule (Verr.Maj / Shift) attendu par la douchette n'est
// pas le bon, elle envoie les chiffres de la rangée du haut sous forme de
// symboles AZERTY non-shiftés (0->à, 7->è, 1->&, etc.). Ces caractères
// étaient jusqu'ici simplement supprimés par normalizeCode, ce qui faisait
// disparaître les chiffres de l'ID (ex: "PR-07" reçu comme "PR)àè").
// On "retraduit" ces symboles en chiffres avant de normaliser, en plus de
// la normalisation classique, et on teste les deux versions.
// ════════════════════════════════════════════
const AZERTY_DIGIT_MAP = {'&':'1','é':'2','"':'3',"'":'4','(':'5','-':'6','è':'7','_':'8','ç':'9','à':'0','§':'6'};
function azertyDigitFix(s){
  return (s||'').toString().replace(/[&é"'(\-è_çà§]/g, ch => AZERTY_DIGIT_MAP[ch] || ch);
}
// Cherche la machine correspondant au code scanné : normalisation classique
// d'abord, puis en filet de sécurité, la version "chiffres AZERTY retraduits".
function findMachineByCode(code){
  const nStandard = normalizeCode(code);
  let m = APP.machines.find(x=>normalizeCode(x.id)===nStandard);
  if(m) return {machine:m, viaFallback:false};
  const nFixed = normalizeCode(azertyDigitFix(code));
  if(nFixed !== nStandard){
    m = APP.machines.find(x=>normalizeCode(x.id)===nFixed);
    if(m) return {machine:m, viaFallback:true};
  }
  return {machine:null, viaFallback:false};
}
function handleScan(raw){
  const code=extractMachineCode(raw);
  const {machine:m, viaFallback}=findMachineByCode(code);
  showScanDebug(raw, code, !!m, viaFallback);
  if(!m){
    flashScanResult(false, code);
    return;
  }
  flashScanResult(true, m.name);
  nav('operator');
  selectMachine(m.id, true);
}
// Affiche ce qui a été reçu, en clair, pour diagnostiquer un souci de disposition clavier (AZERTY/QWERTY) sur la douchette
function showScanDebug(raw, parsed, matched, viaFallback){
  const box=document.getElementById('scan-debug');
  if(!box) return;
  const idsList = APP.machines.map(x=>x.id).join(', ');
  box.style.display='block';
  box.style.borderColor = matched ? 'rgba(34,197,94,.4)' : 'rgba(232,64,64,.4)';
  box.innerHTML = `
    <div style="font-size:12px;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Dernier scan reçu</div>
    <div style="font-family:var(--font-mono);font-size:18px;color:${matched?'var(--green)':'var(--red)'};word-break:break-all">"${raw}"</div>
    <div style="font-size:13px;color:var(--gray);margin-top:6px">Code interprété : <span class="mono" style="color:var(--text)">${parsed}</span> (${raw.length} caractère${raw.length>1?'s':''})</div>
    ${viaFallback?`<div style="font-size:13px;color:var(--yellow);margin-top:4px">⚠ Correction clavier AZERTY appliquée (chiffres retraduits) — vérifiez la machine sélectionnée</div>`:''}
    <div style="font-size:13px;color:var(--gray);margin-top:4px">${matched?'Correspond à une machine':'Ne correspond à aucun ID connu. IDs existants : '+idsList}</div>
  `;
}
function flashScanResult(ok, label){
  const lbl=document.getElementById('sync-label');
  if(!lbl) return;
  const prevColor=lbl.style.color, prevText=lbl.textContent;
  lbl.textContent = ok ? 'Scan : '+label : 'Code inconnu';
  lbl.style.color = ok ? 'var(--green)' : 'var(--red)';
  setTimeout(()=>{ lbl.textContent=prevText; lbl.style.color=prevColor; },1600);
}

  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));

// FICHES D'INSTRUCTION — PDF par machine (référence par nom de fichier)
// Le PDF est déposé manuellement dans le MÊME DOSSIER que cette page HTML.
// Seul le nom du fichier est stocké dans le Sheet (texte court, aucun souci de taille).
// ════════════════════════════════════════════
function getInstructionSheet(machineId){
  return (APP.instructionSheets && APP.instructionSheets[machineId]) || null;
}
function instructionSheetUrl(fileName){
  if(PDF_FOLDER_URL){
    return PDF_FOLDER_URL.replace(/\/+$/,'') + '/' + encodeURIComponent(fileName);
  }
  return encodeURI(fileName);
}
function viewInstructionSheet(machineId){
  const sheet = getInstructionSheet(machineId);
  if(!sheet || !sheet.fileName){ alert('Fiche introuvable.'); return; }
  const url = instructionSheetUrl(sheet.fileName);
  const win = window.open(url, '_blank');
  if(!win){ alert("Le navigateur a peut-être bloqué l'ouverture. Autorise les pop-ups pour ce site, ou vérifie l'URL : "+url); }
}
function setInstructionSheet(machineId){
  const input=document.getElementById('instr-file-input');
  if(!input) return;
  input.dataset.machineId=machineId;
  input.value='';
  input.click();
}
function onInstructionFileSelected(inputEl){
  const machineId=inputEl.dataset.machineId;
  const file=inputEl.files && inputEl.files[0];
  if(!machineId || !file) return;
  const isPdf = file.type==='application/pdf' || file.name.toLowerCase().endsWith('.pdf');
  if(!isPdf){ alert('Choisis un fichier PDF.'); return; }
  // On ne lit QUE le nom du fichier, jamais son contenu — rien n'est envoyé/stocké dans le Sheet à part ce texte.
  syncedWrite(()=>{
    if(!APP.instructionSheets) APP.instructionSheets={};
    APP.instructionSheets[machineId]={ fileName:file.name, addedAt: today()+' '+nowTime() };
  }).then(renderAdmin);
}
function deleteInstructionSheet(machineId){
  const sheet=getInstructionSheet(machineId);
  if(!sheet) return;
  if(!confirm(`Retirer le lien vers "${sheet.fileName}" pour cette machine ? (le fichier PDF lui-même n'est pas supprimé du dossier)`)) return;
  syncedWrite(()=>{
    if(APP.instructionSheets) delete APP.instructionSheets[machineId];
  }).then(renderAdmin);
}

// CHRONOMÈTRE — visible pendant le remplissage de la TPM
// ════════════════════════════════════════════
let chronoInterval=null;
function stopChrono(){
  if(chronoInterval){ clearInterval(chronoInterval); chronoInterval=null; }
}
function updateChronoDisplay(){
  const el=document.getElementById('chrono-display');
  if(!el || !opState.startTime){ stopChrono(); return; }
  const sec=Math.floor((Date.now()-opState.startTime)/1000);
  const m=Math.floor(sec/60), s=sec%60;
  el.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function startChronoIfNeeded(){
  stopChrono();
  if(opState.machineId && !opState.submitted && opState.startTime){
    chronoInterval=setInterval(updateChronoDisplay,1000);
    updateChronoDisplay();
  }
}

function selectMachine(id, fromScan){
  opState.machineId=id; opState.operatorName=''; opState.answers={};
  opState.startTime = id ? Date.now() : null; // démarrage du chronomètre (mesuré, non affiché)
  if(id) history.replaceState(null,'','?machine='+id);
  renderOperator();
}
function selectOp(name){ opState.operatorName=name; renderOperator(); }
 
function setAns(i, val){
  opState.answers[i]=val;
  const questions=APP.questions[getCat(opState.machineId)]||[];
  const pct=Math.round(Object.keys(opState.answers).length/questions.length*100);
  const pf=document.getElementById('pfill');
  if(pf) pf.style.width=pct+'%';
  document.querySelectorAll('.check-row').forEach((row,idx)=>{
    const ans=opState.answers[idx]||'';
    const btns=row.querySelectorAll('.radio-btn');
    if(btns[0]) btns[0].className='radio-btn'+(ans==='ok'?' ok-active':'');
    if(btns[1]) btns[1].className='radio-btn'+(ans==='ko'?' ko-active':'');
  });
  const allDone=opState.machineId&&opState.operatorName&&Object.keys(opState.answers).length===questions.length&&questions.length>0;
  const btn=document.querySelector('.btn-primary');
  if(btn) btn.disabled=!allDone;
  const lbl=document.querySelector('.progress-label');
  if(lbl) lbl.textContent=`${Object.keys(opState.answers).length}/${questions.length} points renseignés`;
}
 
function submitTPM(){
  const cat=getCat(opState.machineId);
  const questions=APP.questions[cat]||[];
  if(Object.keys(opState.answers).length!==questions.length) return;
  const hasIssue=Object.values(opState.answers).some(a=>a==='ko');
  const machineId=opState.machineId, operatorName=opState.operatorName, answers={...opState.answers};
  const durationSec = opState.startTime ? Math.max(1,Math.round((Date.now()-opState.startTime)/1000)) : null;
  syncedWrite(()=>{
    const record={
      machineId, machineName:getMachineName(machineId),
      operator:operatorName, cat, questions:[...questions],
      time:nowTime(),
      date:today(), weekKey:APP.weekKey,
      answers, anomaly:hasIssue,
      durationSec,
      validations:{admin:null,chef:null}
    };
    APP.weekRecords[machineId]=record;
    APP.history.unshift(record); // archive, jamais supprimée
  });
  opState.submitted=true;
  opState.lastDuration=durationSec;
  stopChrono();
  renderOperator();
}
 
function resetOp(){
  opState={machineId:getParam('machine')||'',operatorName:'',answers:{},submitted:false,startTime:null,lastDuration:null};
  renderOperator();
}

// VALIDATION MAINTENANCE — double signature Admin / Chef d'atelier
// ════════════════════════════════════════════
function isValidated(record, role){
  return !!(record && record.validations && record.validations[role] && record.validations[role].done);
}
function validationBadge(record, role){
  const v = record && record.validations ? record.validations[role] : null;
  if(v && v.done) return `<span class="badge badge-green">✓ ${v.time}</span>`;
  return `<span class="badge badge-gray">En attente</span>`;
}
function machinesDoneNotValidated(role){
  return APP.machines.filter(m=>{
    const r=APP.weekRecords[m.id];
    return r && !isValidated(r, role);
  });
}
function renderValidationBanner(role){
  if(!isUrgentPeriod()) return '';
  const pending = machinesDoneNotValidated(role);
  if(pending.length===0) return '';
  const roleLabel = role==='admin' ? 'Administrateur' : "Chef d'atelier";
  return `<div class="warn-banner">
    <svg width="14" height="14" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span><strong>À valider !</strong> ${pending.length} fiche${pending.length>1?'s':''} contrôlée${pending.length>1?'s':''} mais pas encore validée${pending.length>1?'s':''} par ${roleLabel} avant le reset de dimanche soir : ${pending.map(m=>m.name).join(' · ')}</span>
  </div>`;
}
function toggleValidation(machineId, role){
  const record = APP.weekRecords[machineId];
  if(!record) return;
  const label = role==='admin' ? 'Administrateur' : "Chef d'atelier";
  if(isValidated(record, role)){
    if(!confirm(`Annuler la validation (${label}) pour ${record.machineName||machineId} ?`)) return;
    syncedWrite(()=>{
      const r=APP.weekRecords[machineId];
      if(r && r.validations) r.validations[role]=null;
    }).then(renderAdmin);
  } else {
    syncedWrite(()=>{
      const r=APP.weekRecords[machineId];
      if(!r) return;
      if(!r.validations) r.validations={admin:null,chef:null};
      r.validations[role]={done:true,by:label,date:today(),time:nowTime()};
    }).then(renderAdmin);
  }
}

      ${(APP.operators[cat]||[]).map((o,i)=>`
      <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--text)">
        <span style="flex:1;padding-right:7px">${o}</span>
        <button onclick="removeOperator('${cat}',${i})" style="background:none;border:none;color:var(--gray2);cursor:pointer;font-size:17px;padding:2px 5px;border-radius:5px">×</button>
      </div>`).join('')}
      ${(APP.operators[cat]||[]).length===0?`<div style="font-size:12px;color:var(--gray2);padding:7px 0">Aucun opérateur pour cette catégorie</div>`:''}
    </div>`).join('')}
  </div>
 
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:${adminState.showArchive?'14px':'0'}">
      <div class="card-title" style="margin-bottom:0">Archives — historique par semaine (rien n'est supprimé)</div>
      <button class="toggle-link" onclick="toggleArchive()">${adminState.showArchive?'Masquer':'Afficher'} (${APP.history.length})</button>
    </div>
    ${adminState.showArchive?renderArchiveByWeek():`<p style="font-size:15px;color:var(--gray)">${APP.history.length} fiche(s) archivée(s) depuis le début, classées automatiquement par semaine. Cliquez sur "Afficher" pour consulter l'historique complet — aucune donnée n'est jamais effacée.</p>`}
  </div>`;
  renderBCThumbGrid();
}
 
// Regroupe l'historique par semaine (la plus récente en premier)
function renderArchiveByWeek(){
  if(APP.history.length===0){
    return `<p style="font-size:15px;color:var(--gray)">Aucune fiche archivée pour l'instant.</p>`;
  }
  const groups={};
  APP.history.forEach(r=>{
    const wk=r.weekKey||currentWeekKey();
    if(!groups[wk]) groups[wk]=[];
    groups[wk].push(r);
  });
  const weekKeys=Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  if(adminState.expandedWeek===undefined){
    adminState.expandedWeek = weekKeys[0]; // la semaine la plus récente ouverte par défaut, une seule fois
  }
  return weekKeys.map(wk=>{
    const records=groups[wk];
    const anomalies=records.filter(r=>r.anomaly).length;
    const isOpen=adminState.expandedWeek===wk;
    const isCurrent=wk===APP.weekKey;
    return `<div class="week-group">
      <div class="week-group-head" onclick="toggleWeekGroup('${wk}')">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <span class="week-group-title">Semaine du ${weekLabel(wk)}</span>
          ${isCurrent?'<span class="badge badge-yellow">En cours</span>':''}
          <span class="badge badge-gray">${records.length} fiche${records.length>1?'s':''}</span>
          ${anomalies>0?`<span class="badge badge-red">${anomalies} anomalie${anomalies>1?'s':''}</span>`:''}
        </div>
        <span style="font-size:20px;color:var(--gray);transform:rotate(${isOpen?'180deg':'0deg'});transition:transform .15s">▾</span>
      </div>
      ${isOpen?`<div class="week-group-body">
        <table class="tbl">
          <thead><tr><th>Machine</th><th>Opérateur</th><th>Date</th><th>Heure</th><th>Durée</th><th>Statut</th><th>Val. Admin</th><th>Val. Chef</th></tr></thead>
          <tbody>
            ${records.map(r=>`<tr>
              <td style="font-weight:600">${catIcon(r.cat)} ${r.machineName||r.machineId}</td>
              <td>${r.operator}</td>
              <td style="color:var(--gray)">${r.date}</td>
              <td style="color:var(--gray)">${r.time}</td>
              <td style="font-variant-numeric:tabular-nums;font-family:var(--font-mono)">${fmtDuration(r.durationSec)}</td>
              <td>${r.anomaly?`<span class="badge badge-red">Anomalie</span>`:`<span class="badge badge-green">OK</span>`}</td>
              <td>${validationBadge(r,'admin')}</td>
              <td>${validationBadge(r,'chef')}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`:''}
    </div>`;
  }).join('');
}
function toggleWeekGroup(wk){
  adminState.expandedWeek = (adminState.expandedWeek===wk) ? null : wk;
  renderAdmin();
}
 
function tryAdmin(){
  const input=document.getElementById('admin-pass');
  const val=input?input.value:adminState.pass;
  if(val===ADMIN_CODE){adminState.locked=false;adminState.role='admin';renderAdmin();}
  else if(val===CHEF_CODE){adminState.locked=false;adminState.role='chef';renderAdmin();}
  else{const err=document.getElementById('admin-err');if(err)err.style.display='block';}
}
function lockAdmin(){adminState.locked=true;adminState.role=null;renderAdmin();}
function toggleAddMachine(){adminState.addingMachine=!adminState.addingMachine;renderAdmin();}
function toggleArchive(){adminState.showArchive=!adminState.showArchive;renderAdmin();}
function addMachine(){
  const name=document.getElementById('new-mname')?.value||adminState.newName;
  if(!name.trim()){alert('Entrez un nom');return;}
  const cats=Object.keys(APP.questions);
  if(cats.length===0){alert('Créez d\'abord une famille de machines.');return;}
  const cat=cats.includes(adminState.newCat)?adminState.newCat:cats[0];
  adminState.newName='';adminState.addingMachine=false;
  renderAdmin();
  let id;
  syncedWrite(()=>{
    const prefix=cat.substring(0,2).toUpperCase();
    const count=APP.machines.filter(m=>m.cat===cat).length+1;
    id=`${prefix}-${String(count).padStart(2,'0')}`;
    APP.machines.push({id,name:name.trim(),cat});
  }).then(()=>{
    renderAdmin();
    showBC(id);
  });
}
function addQuestion(cat){
  const q=prompt(`Nouvelle question pour "${cat}" :`);
  if(q&&q.trim()){
    syncedWrite(()=>{ if(!APP.questions[cat]) APP.questions[cat]=[]; APP.questions[cat].push(q.trim()); }).then(renderAdmin);
  }
}
function removeQ(cat,i){
  if(confirm('Supprimer ce point de contrôle ?')){
    syncedWrite(()=>{ APP.questions[cat].splice(i,1); }).then(renderAdmin);
  }
}
function addOperator(cat){
  const name=prompt(`Prénom du nouvel opérateur pour "${cat}" :`);
  if(name&&name.trim()){
    syncedWrite(()=>{ if(!APP.operators[cat]) APP.operators[cat]=[]; APP.operators[cat].push(name.trim()); }).then(renderAdmin);
  }
}
function removeOperator(cat,i){
  if(confirm('Supprimer cet opérateur ?')){
    syncedWrite(()=>{ APP.operators[cat].splice(i,1); }).then(renderAdmin);
  }
}
 
// ════════════════════════════════════════════
// SUPPRESSION / RÉAFFECTATION DE MACHINES
// ════════════════════════════════════════════
function deleteMachine(id){
  const m=APP.machines.find(x=>x.id===id);
  if(!m) return;
  if(!confirm(`Supprimer définitivement "${m.name}" ? L'historique déjà archivé de cette machine sera conservé, mais elle disparaîtra du parc et du suivi de la semaine.`)) return;
  syncedWrite(()=>{
    APP.machines=APP.machines.filter(x=>x.id!==id);
    delete APP.weekRecords[id];
    if(APP.instructionSheets) delete APP.instructionSheets[id];
  }).then(renderAdmin);
}
function changeMachineCat(id,newCat){
  syncedWrite(()=>{
    const m=APP.machines.find(x=>x.id===id);
    if(m) m.cat=newCat;
  }).then(renderAdmin);
}
 
// ════════════════════════════════════════════
// GESTION DES FAMILLES DE MACHINES (CATÉGORIES)
// ════════════════════════════════════════════
function addCategory(){
  const name=prompt('Nom de la nouvelle famille de machines (ex: Perçage) :');
  if(!name||!name.trim()) return;
  const clean=name.trim();
  if(APP.questions[clean]||APP.operators[clean]){ alert('Cette famille existe déjà.'); return; }
  syncedWrite(()=>{
    APP.questions[clean]=[];
    APP.operators[clean]=[];
  }).then(renderAdmin);
}
function renameCategory(oldCat){
  const name=prompt(`Renommer la famille "${oldCat}" en :`, oldCat);
  if(!name||!name.trim()) return;
  const clean=name.trim();
  if(clean===oldCat) return;
  if(APP.questions[clean]||APP.operators[clean]){ alert('Une famille porte déjà ce nom.'); return; }
  syncedWrite(()=>{
    APP.questions[clean]=APP.questions[oldCat]||[];
    APP.operators[clean]=APP.operators[oldCat]||[];
    delete APP.questions[oldCat];
    delete APP.operators[oldCat];
    APP.machines.forEach(m=>{ if(m.cat===oldCat) m.cat=clean; });
    if(adminState.newCat===oldCat) adminState.newCat=clean;
  }).then(renderAdmin);
}
function deleteCategory(cat){
  const inUse=APP.machines.some(m=>m.cat===cat);
  if(inUse){ alert('Impossible : des machines sont encore rattachées à cette famille. Réassignez-les ou supprimez-les d\'abord.'); return; }
  if(!confirm(`Supprimer la famille "${cat}" et ses questions/opérateurs associés ?`)) return;
  syncedWrite(()=>{
    delete APP.questions[cat];
    delete APP.operators[cat];
    if(adminState.newCat===cat){
      const remaining=Object.keys(APP.questions);
      adminState.newCat=remaining[0]||'';
    }
  }).then(renderAdmin);
}
 
// ════════════════════════════════════════════
// CODE-BARRES — un code-barres CODE128 par machine (encode l'ID machine)
// ════════════════════════════════════════════
function showBC(machineId){
  const m=APP.machines.find(x=>x.id===machineId);
  if(!m) return;
  document.getElementById('bc-modal-title').textContent=m.name;
  document.getElementById('bc-modal-sub').textContent=m.cat+' — '+m.id;
  const canvas=document.getElementById('bc-canvas');
  try{
    JsBarcode(canvas, m.id, {
      format:"CODE128",
      lineColor:"#000",
      width:2.6,
      height:75,
      displayValue:true,
      fontSize:16,
      margin:10
    });
    window.__lastBCDataUrl = canvas.toDataURL('image/png');
    window.__lastBCName = m.name;
  }catch(e){
    window.__lastBCDataUrl=null;
  }
  document.getElementById('bc-modal').classList.add('open');
}
function downloadBC(){
  if(!window.__lastBCDataUrl){alert('Code-barres non disponible');return;}
  const a=document.createElement('a');
  a.href=window.__lastBCDataUrl;
  a.download='CODE-'+(window.__lastBCName||'machine')+'.png';
  document.body.appendChild(a);
  a.click();
  a.remove();
}
 
// Miniatures de tous les codes-barres, affichées directement dans l'écran Admin
function renderBCThumbGrid(){
  const grid=document.getElementById('qr-thumb-grid');
  if(!grid) return;
  grid.innerHTML = APP.machines.map(m=>
    `<div onclick="showBC('${m.id}')" style="cursor:pointer;background:#fff;border-radius:8px;padding:6px;text-align:center">
      <canvas id="thumb-${m.id}"></canvas>
    </div>`).join('');
  APP.machines.forEach(m=>{
    const c=document.getElementById('thumb-'+m.id);
    if(!c) return;
    try{
      JsBarcode(c, m.id, { format:"CODE128", lineColor:"#000", width:1.4, height:36, displayValue:true, fontSize:10, margin:4 });
    }catch(e){}
  });
}
 
// Imprime tous les codes-barres d'un coup, prêts à découper et plastifier
function printAllBC(){
  if(!APP.machines.length){ alert('Aucune machine à imprimer'); return; }
  const w=window.open('', '_blank');
  if(!w){ alert('Autorisez les pop-ups pour imprimer'); return; }
  const cards=APP.machines.map(m=>{
    const tmp=document.createElement('canvas');
    try{
      JsBarcode(tmp, m.id, { format:"CODE128", lineColor:"#000", width:2.2, height:65, displayValue:true, fontSize:14, margin:8 });
    }catch(e){}
    const src=tmp.toDataURL('image/png');
    return `<div style="border:1px dashed #999;border-radius:6px;padding:10px;text-align:center;break-inside:avoid;margin-bottom:14px;display:inline-block">
      <div style="font-family:Arial,sans-serif;font-weight:700;font-size:13px;margin-bottom:4px">${catIcon(m.cat)} ${m.name}</div>
      <div style="font-family:Arial,sans-serif;font-size:13px;color:#666;margin-bottom:8px">${m.cat}</div>
      <img src="${src}" style="max-width:220px">
    </div>`;
  }).join('');
  w.document.write(`<!DOCTYPE html><html><head><title>Codes-barres TPMConnect</title>
    <style>
      body{font-family:Arial,sans-serif;padding:20px}
      .grid{display:flex;flex-wrap:wrap;gap:14px;justify-content:flex-start}
      @media print{ body{padding:0} }
    </style></head>
    <body><div class="grid">${cards}</div></body></html>`);
  w.document.close();
  setTimeout(()=>{ w.focus(); w.print(); }, 400);
}
 
function closeBC(){document.getElementById('bc-modal').classList.remove('open');}
document.getElementById('bc-modal').addEventListener('click',function(e){if(e.target===this)closeBC();});
document.getElementById('startup-modal').addEventListener('click',function(e){if(e.target===this)closeStartup(false);});
 
// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
rolloverWeekIfNeeded();
renderOperator();
fetchFromSheet();
if(getParam('machine')){
  setTimeout(()=>{
    const sel=document.getElementById('op-name-select');
    if(sel){sel.scrollIntoView({behavior:'smooth',block:'center'});sel.focus();}
  },100);
}
</script>
