<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TPMConnect</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;
  --bg2:#111111;
  --bg3:#1a1a1a;
  --bg4:#222222;
  --yellow:#F5C518;
  --yellow2:#FFD700;
  --yellow-dim:#3d3000;
  --red:#E84040;
  --green:#22C55E;
  --gray:#888;
  --gray2:#555;
  --border:#2a2a2a;
  --border2:#333;
  --text:#F0F0F0;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px}

.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 14px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{color:#fff;font-size:17px;font-weight:700;letter-spacing:-0.3px;display:flex;align-items:center;gap:6px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--yellow);display:inline-block}
.logo span{color:var(--yellow)}
.sync-indicator{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--gray)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--gray2);flex-shrink:0;transition:background .3s}
.sync-dot.live{background:var(--green);animation:blink 2s infinite}
.sync-dot.error{background:var(--red)}
.sync-dot.syncing{background:var(--yellow);animation:blink .6s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.topbar-tabs{display:flex;gap:1px}
.topbar-tab{background:transparent;border:none;color:var(--gray);font-size:11px;padding:5px 9px;border-radius:6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .15s}
.topbar-tab svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.topbar-tab.active{color:var(--yellow);background:rgba(245,197,24,.1)}

.view{display:none;padding:14px;max-width:640px;margin:0 auto;padding-bottom:50px}
.view.active{display:block}

.card{background:var(--bg2);border-radius:12px;padding:15px;margin-bottom:10px;border:1px solid var(--border)}
.card-title{font-size:11px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px}

label.lbl{display:block;font-size:12px;font-weight:500;color:var(--gray);margin-bottom:4px;margin-top:10px}
label.lbl:first-child{margin-top:0}
select,input[type=text],input[type=password]{
  width:100%;padding:10px 13px;border:1px solid var(--border2);border-radius:9px;
  background:var(--bg3);color:var(--text);font-size:14px;appearance:none;
  transition:border-color .15s
}
select:focus,input:focus{outline:none;border-color:var(--yellow)}
select:disabled{background:var(--bg2);color:var(--gray2)}
option{background:var(--bg3)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 18px;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s;width:100%}
.btn-primary{background:var(--yellow);color:#000}
.btn-primary:hover{background:var(--yellow2)}
.btn-primary:disabled{background:var(--gray2);color:#666;cursor:not-allowed}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}
.btn-secondary:hover{border-color:var(--gray)}
.btn-danger{background:rgba(232,64,64,.1);color:var(--red);border:1px solid rgba(232,64,64,.3)}
.btn-sm{padding:6px 13px;font-size:12px;width:auto;border-radius:7px}

.machine-header{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:15px;margin-bottom:10px;position:relative;overflow:hidden}
.machine-header::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--yellow)}
.machine-header .cat-tag{display:inline-block;background:var(--yellow-dim);color:var(--yellow);font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;margin-bottom:7px;letter-spacing:.5px;text-transform:uppercase}
.machine-header h2{font-size:20px;font-weight:700;margin-bottom:1px;color:#fff}
.machine-header p{color:var(--gray);font-size:12px}

.check-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border)}
.check-row:last-child{border-bottom:none}
.check-q{font-size:13px;flex:1;padding-right:10px;line-height:1.4;color:var(--text)}
.radio-pair{display:flex;gap:5px;flex-shrink:0}
.radio-btn{padding:6px 11px;border-radius:7px;border:1px solid var(--border2);font-size:12px;font-weight:600;cursor:pointer;background:var(--bg3);color:var(--gray);transition:all .15s}
.radio-btn:hover{border-color:var(--gray)}
.radio-btn.ok-active{background:rgba(34,197,94,.12);border-color:#22C55E;color:#22C55E}
.radio-btn.ko-active{background:rgba(232,64,64,.12);border-color:var(--red);color:var(--red)}

.progress-wrap{margin-top:12px}
.progress-bar{height:3px;background:var(--border2);border-radius:2px;overflow:hidden;margin-bottom:5px}
.progress-fill{height:100%;background:var(--yellow);border-radius:2px;transition:width .3s}
.progress-label{font-size:11px;color:var(--gray)}

.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:rgba(34,197,94,.12);color:#22C55E}
.badge-red{background:rgba(232,64,64,.12);color:var(--red)}
.badge-yellow{background:var(--yellow-dim);color:var(--yellow)}
.badge-gray{background:var(--bg3);color:var(--gray);border:1px solid var(--border2)}

.machine-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}
.machine-tile{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:12px;cursor:pointer;transition:all .2s}
.machine-tile:hover{border-color:var(--border2)}
.machine-tile.done{border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.04)}
.machine-tile.issue{border-color:rgba(232,64,64,.4);background:rgba(232,64,64,.04);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.tile-name{font-size:13px;font-weight:600;margin-bottom:3px;color:#fff}
.tile-info{font-size:11px;color:var(--gray);display:flex;align-items:center;gap:3px}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-green{background:var(--green)}
.dot-red{background:var(--red)}
.dot-gray{background:var(--gray2)}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:10px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:13px;text-align:center}
.stat-num{font-size:26px;font-weight:700;font-variant-numeric:tabular-nums}
.stat-lbl{font-size:10px;color:var(--gray);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

.alert-banner{background:rgba(232,64,64,.08);border:1px solid rgba(232,64,64,.3);border-radius:10px;padding:11px 13px;margin-bottom:10px;font-size:12px;color:#f87171;display:flex;align-items:flex-start;gap:7px}
.alert-banner svg{flex-shrink:0;margin-top:1px}

.info-banner{background:rgba(245,197,24,.06);border:1px solid rgba(245,197,24,.2);border-radius:9px;padding:10px 13px;font-size:12px;color:var(--yellow);margin-bottom:10px}

.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;padding:7px 9px;border-bottom:1px solid var(--border2);font-weight:600;color:var(--gray);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
.tbl td{padding:9px 9px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--bg3)}

.success-screen{text-align:center;padding:40px 20px}
.success-icon{width:70px;height:70px;background:rgba(34,197,94,.1);border:2px solid rgba(34,197,94,.3);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 15px}
.success-icon svg{width:34px;height:34px;stroke:var(--green);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

.lock-screen{display:flex;align-items:center;justify-content:center;min-height:60vh}
.lock-box{width:100%;max-width:300px;text-align:center}
.lock-icon{width:56px;height:56px;background:var(--yellow-dim);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;border:1px solid rgba(245,197,24,.2)}
.lock-icon svg{width:24px;height:24px;stroke:var(--yellow);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:22px;width:100%;max-width:320px;text-align:center}

.section-title{font-size:19px;font-weight:700;margin-bottom:2px;color:#fff}
.section-sub{font-size:12px;color:var(--gray);margin-bottom:14px}
.hint{font-size:11px;color:var(--gray2);margin-top:5px;padding:7px 11px;background:var(--bg3);border-radius:7px;border:1px solid var(--border)}

.live-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(34,197,94,.1);color:var(--green);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;border:1px solid rgba(34,197,94,.2)}
.live-badge::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 1.5s infinite}

.spinner{width:13px;height:13px;border:2px solid var(--border2);border-top-color:var(--yellow);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
</head>
<body>

<div class="topbar">
  <div class="logo"><div class="logo-dot"></div>TPM<span>Connect</span></div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="sync-indicator" id="sync-status">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-label">Connexion...</span>
    </div>
    <div class="topbar-tabs">
      <button class="topbar-tab active" onclick="nav('operator')" id="tab-operator">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h7M14 17h7M14 20h7"/></svg>
        Opér.
      </button>
      <button class="topbar-tab" onclick="nav('dashboard')" id="tab-dashboard">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
        Tableau
      </button>
      <button class="topbar-tab" onclick="nav('admin')" id="tab-admin">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        Admin
      </button>
    </div>
  </div>
</div>

<div class="view active" id="view-operator"><div id="op-content"></div></div>
<div class="view" id="view-dashboard"><div id="db-content"></div></div>
<div class="view" id="view-admin"><div id="admin-content"></div></div>

<div class="modal-overlay" id="qr-modal">
  <div class="modal-box">
    <div id="qr-modal-title" style="font-size:16px;font-weight:700;margin-bottom:3px;color:#fff"></div>
    <div id="qr-modal-sub" style="font-size:11px;color:var(--gray);margin-bottom:10px"></div>
    <div id="qr-modal-inner" style="background:#fff;padding:14px;border-radius:8px;display:inline-block;margin:8px auto"></div>
    <div id="qr-modal-url" style="font-size:10px;color:var(--gray2);word-break:break-all;margin:8px 0 12px"></div>
    <div style="font-size:11px;color:var(--gray);margin-bottom:12px">Plastifiez et collez sur le poste</div>
    <div style="display:flex;gap:7px">
      <button class="btn btn-primary btn-sm" style="flex:1" onclick="downloadQR()">⬇ Télécharger</button>
      <button class="btn btn-secondary btn-sm" style="flex:1" onclick="closeQR()">Fermer</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════
// CONFIG — URL de ton Google Apps Script déployé
// ════════════════════════════════════════════
const SHEET_API_URL = 'https://script.google.com/macros/s/AKfycbxt5aNaPUN80LsmSKBBX6mcrj1ABVFYE7A0-IUSPZTdNOAluNwRRj5pBWZscIUBwySrig/exec';
const POLL_INTERVAL = 4000; // 4s — fréquence de vérification des mises à jour

function today(){ return new Date().toLocaleDateString('fr-FR'); }

function defaultData(){
  return {
    machines:[
      {id:'PR-01',name:'Presse 01',cat:'Presse'},
      {id:'PR-02',name:'Presse 02',cat:'Presse'},
      {id:'PR-03',name:'Presse 03',cat:'Presse'},
      {id:'FR-01',name:'Fraiseuse 01',cat:'Fraisage'},
      {id:'FR-02',name:'Fraiseuse 02',cat:'Fraisage'},
      {id:'TO-01',name:'Tour 01',cat:'Tournage'},
      {id:'LG-01',name:'Ligne Assemblage A',cat:'Ligne'},
      {id:'LG-02',name:'Ligne Assemblage B',cat:'Ligne'},
    ],
    operators:{
      'Presse':['Marie D.','Karim B.','Luc M.','Sofia A.'],
      'Fraisage':['Yann T.','Pierre C.','Amine R.'],
      'Tournage':['Sophie L.','Marc B.'],
      'Ligne':['Amine R.','Nadia F.','Jean P.','Karim B.'],
    },
    questions:{
      'Presse':["Niveau d'huile hydraulique","Contrôle des barrières immatérielles","État des joints et garnitures","Pression de serrage (manomètre)","Nettoyage du bac de récupération"],
      'Fraisage':["Niveau d'huile de broche","État des fraises (usure visible)","Serrage des brides","Lubrification des glissières"],
      'Tournage':["État de la pointe de centrage","Niveau de liquide de coupe","Mandrin : usure des mâchoires"],
      'Ligne':["Capteurs de présence opérationnels","Convoyeur : tension de courroie","Arrêts d'urgence testés","Vérification des préhenseurs"],
    },
    history:[],
    todayDate: today(),
    todayRecords:{}
  };
}

let APP = defaultData();
let lastKnownJSON = '';
let isOnline = false;
let initialSyncDone = false;
let initialSyncError = false;

// ════════════════════════════════════════════
// SYNC ENGINE — Google Sheets via Apps Script
// ════════════════════════════════════════════
function setSyncState(state){
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-label');
  if(!dot) return;
  dot.className='sync-dot';
  if(state==='live'){ dot.classList.add('live'); lbl.textContent='Sheet connecté'; isOnline=true; }
  else if(state==='syncing'){ dot.classList.add('syncing'); lbl.textContent='Synchro...'; }
  else if(state==='error'){ dot.classList.add('error'); lbl.textContent='Hors-ligne'; isOnline=false; }
  else { lbl.textContent='Connexion...'; }
}

async function fetchFromSheet(){
  try{
    const res = await fetch(SHEET_API_URL + '?t=' + Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    if(data && Object.keys(data).length > 0 && data.machines){
      const newJSON = JSON.stringify(data);
      const firstLoad = !initialSyncDone;
      if(newJSON !== lastKnownJSON){
        const changed = lastKnownJSON !== '';
        APP = data;
        if(APP.todayDate !== today()){ APP.todayDate = today(); APP.todayRecords = {}; }
        lastKnownJSON = newJSON;
        initialSyncDone = true;
        rerenderActiveView();
        if(changed) showSyncFlash();
      } else if(firstLoad){
        initialSyncDone = true;
        rerenderActiveView();
      }
      setSyncState('live');
      return true;
    } else {
      // Sheet vide -> on initialise avec les données par défaut
      lastKnownJSON = JSON.stringify(APP);
      initialSyncDone = true;
      await pushToSheet();
      rerenderActiveView();
      setSyncState('live');
      return true;
    }
  }catch(err){
    setSyncState('error');
    if(!initialSyncDone){ initialSyncError = true; rerenderActiveView(); }
    return false;
  }
}

async function pushToSheet(){
  setSyncState('syncing');
  try{
    await fetch(SHEET_API_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body: JSON.stringify(APP)
    });
    lastKnownJSON = JSON.stringify(APP);
    setSyncState('live');
  }catch(err){
    setSyncState('error');
  }
}

function saveData(){
  pushToSheet();
}

// Récupère la toute dernière version du Sheet, applique le changement par-dessus,
// puis pousse le résultat. Réduit fortement le risque que deux appareils
// s'écrasent mutuellement en écrivant en même temps.
async function syncedWrite(mutator){
  setSyncState('syncing');
  await fetchFromSheet();
  mutator();
  await pushToSheet();
  rerenderActiveView();
}

function showSyncFlash(){
  const lbl=document.getElementById('sync-label');
  if(lbl){
    const prev=lbl.textContent;
    lbl.textContent='↻ Mis à jour';
    lbl.style.color='var(--yellow)';
    setTimeout(()=>{ lbl.textContent=prev; lbl.style.color=''; },1200);
  }
}

function rerenderActiveView(){
  const cv=document.querySelector('.view.active');
  if(!cv) return;
  if(cv.id==='view-dashboard') renderDashboard();
  else if(cv.id==='view-admin' && !adminState.locked) renderAdmin();
  else if(cv.id==='view-operator'){
    // On rafraîchit tant que l'opérateur n'a pas vraiment commencé à remplir
    // (pas de nom choisi, pas de réponse donnée, pas encore validé).
    // Ça permet au menu de se mettre à jour même si un ID de machine
    // était déjà préchargé via le QR code avant que les données arrivent.
    const noProgress = !opState.operatorName && Object.keys(opState.answers).length===0 && !opState.submitted;
    if(noProgress) renderOperator();
  }
}

setInterval(fetchFromSheet, POLL_INTERVAL);

// ════════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════════
function nav(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.topbar-tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.getElementById('tab-'+v).classList.add('active');
  if(v==='operator') renderOperator();
  else if(v==='dashboard') renderDashboard();
  else renderAdmin();
}

function getParam(k){ return new URLSearchParams(window.location.search).get(k); }

// ════════════════════════════════════════════
// VUE OPÉRATEUR
// ════════════════════════════════════════════
let opState = {
  machineId: getParam('machine') || '',
  operatorName: '',
  answers: {},
  submitted: false
};

function getCat(id){ const m=APP.machines.find(x=>x.id===id); return m?m.cat:null; }
function getMachineName(id){ const m=APP.machines.find(x=>x.id===id); return m?m.name:id; }
function getRecord(id){ return APP.todayRecords[id]||null; }

function renderOperator(){
  const c = document.getElementById('op-content');

  if(!initialSyncDone){
    if(initialSyncError){
      c.innerHTML = `
      <div class="success-screen">
        <div class="success-icon" style="background:rgba(232,64,64,.1);border-color:rgba(232,64,64,.3)">
          <svg viewBox="0 0 24 24" stroke="var(--red)" fill="none" stroke-width="2"><line x1="12" y1="8" x2="12" y2="13"/><circle cx="12" cy="16" r="0.5" fill="var(--red)"/><circle cx="12" cy="12" r="10"/></svg>
        </div>
        <div class="section-title">Connexion impossible</div>
        <div style="font-size:13px;color:var(--gray);margin:5px 0 18px">Impossible de récupérer les machines à jour. Vérifie ta connexion internet.</div>
        <button class="btn btn-primary" onclick="initialSyncError=false;renderOperator();fetchFromSheet();">Réessayer</button>
      </div>`;
      return;
    }
    c.innerHTML = `
    <div class="success-screen">
      <div class="success-icon" style="background:var(--yellow-dim);border-color:rgba(245,197,24,.3)">
        <svg viewBox="0 0 24 24" stroke="var(--yellow)" style="animation:spin 1s linear infinite;transform-origin:center"><path d="M21 12a9 9 0 11-9-9"/></svg>
      </div>
      <div class="section-title">Connexion en cours…</div>
      <div style="font-size:13px;color:var(--gray);margin:5px 0 4px">Récupération de la liste des machines à jour</div>
    </div>
    <style>@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}</style>`;
    return;
  }

  if(opState.submitted){
    const hasIssue = Object.values(opState.answers).some(a=>a==='ko');
    c.innerHTML = `
    <div class="success-screen">
      <div class="success-icon"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="section-title">TPM validée</div>
      <div style="font-size:13px;color:var(--gray);margin:5px 0 18px">${getMachineName(opState.machineId)} — ${new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</div>
      ${hasIssue?`<div class="alert-banner"><svg width="14" height="14" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span><strong>Anomalie signalée</strong> — alerte envoyée à la maintenance</span></div>`:''}
      <div style="background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.2);border-radius:10px;padding:13px;font-size:12px;color:#4ade80;margin-bottom:18px">
        ✓ Fiche enregistrée sur Google Sheets — visible partout
      </div>
      <button class="btn btn-secondary" onclick="resetOp()">Nouvelle saisie</button>
    </div>`;
    return;
  }

  const cat = getCat(opState.machineId);
  const ops = cat ? (APP.operators[cat]||[]) : [];
  const questions = cat ? (APP.questions[cat]||[]) : [];
  const answered = Object.keys(opState.answers).length;
  const allDone = opState.machineId && opState.operatorName && answered===questions.length && questions.length>0;
  const existing = opState.machineId ? getRecord(opState.machineId) : null;

  let html = `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">
    <div class="section-title">Contrôle TPM</div>
    <span class="badge badge-gray">${new Date().toLocaleDateString('fr-FR')}</span>
  </div>
  <div class="section-sub">Sélectionnez votre machine et votre nom</div>

  ${!isOnline?`<div class="alert-banner"><svg width="14" height="14" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span>Connexion à Google Sheets indisponible — vérifie ta connexion</span></div>`:''}

  ${existing?`<div class="info-banner">
    ✓ TPM déjà faite ce matin par <strong>${existing.operator}</strong> à ${existing.time}
  </div>`:''}

  <div class="card">
    <label class="lbl">Machine</label>
    <select onchange="selectMachine(this.value)">
      <option value="">— Choisir une machine —</option>
      ${APP.machines.map(m=>`<option value="${m.id}" ${opState.machineId===m.id?'selected':''}>${m.name} (${m.cat})</option>`).join('')}
    </select>
    <label class="lbl" style="margin-top:12px">Votre nom ${!opState.machineId?'<span style="color:var(--gray2);font-weight:400">(choisir machine d\'abord)</span>':''}</label>
    <select id="op-name-select" onchange="selectOp(this.value)" ${!opState.machineId?'disabled':''}>
      <option value="">— Sélectionner votre nom —</option>
      ${ops.map(o=>`<option value="${o}" ${opState.operatorName===o?'selected':''}>${o}</option>`).join('')}
    </select>
    ${cat?`<div class="hint">✓ Opérateurs habilités <strong>${cat}</strong> uniquement</div>`:''}
  </div>`;

  if(opState.operatorName && questions.length>0){
    html += `
    <div class="machine-header">
      <div class="cat-tag">${cat}</div>
      <h2>${getMachineName(opState.machineId)}</h2>
      <p>Opérateur : ${opState.operatorName}</p>
    </div>
    <div class="card">
      <div class="card-title">Points de contrôle</div>
      ${questions.map((q,i)=>{
        const ans=opState.answers[i]||'';
        return `<div class="check-row">
          <span class="check-q">${q}</span>
          <div class="radio-pair">
            <button class="radio-btn ${ans==='ok'?'ok-active':''}" onclick="setAns(${i},'ok')">✓ OK</button>
            <button class="radio-btn ${ans==='ko'?'ko-active':''}" onclick="setAns(${i},'ko')">⚠ Pb</button>
          </div>
        </div>`;
      }).join('')}
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="pfill" style="width:${Math.round(answered/questions.length*100)}%"></div></div>
        <div class="progress-label">${answered}/${questions.length} points renseignés</div>
      </div>
    </div>
    <button class="btn btn-primary" onclick="submitTPM()" ${allDone?'':'disabled'}>
      Valider la TPM du matin
    </button>
    ${!allDone?`<div style="text-align:center;font-size:11px;color:var(--gray);margin-top:7px">Répondez à tous les points pour valider</div>`:''}`;
  }

  c.innerHTML = html;
}

function selectMachine(id){
  opState.machineId=id; opState.operatorName=''; opState.answers={};
  if(id) history.replaceState(null,'','?machine='+id);
  renderOperator();
}
function selectOp(name){ opState.operatorName=name; renderOperator(); }

function setAns(i, val){
  opState.answers[i]=val;
  const questions=APP.questions[getCat(opState.machineId)]||[];
  const pct=Math.round(Object.keys(opState.answers).length/questions.length*100);
  const pf=document.getElementById('pfill');
  if(pf) pf.style.width=pct+'%';
  document.querySelectorAll('.check-row').forEach((row,idx)=>{
    const ans=opState.answers[idx]||'';
    const btns=row.querySelectorAll('.radio-btn');
    if(btns[0]) btns[0].className='radio-btn'+(ans==='ok'?' ok-active':'');
    if(btns[1]) btns[1].className='radio-btn'+(ans==='ko'?' ko-active':'');
  });
  const allDone=opState.machineId&&opState.operatorName&&Object.keys(opState.answers).length===questions.length&&questions.length>0;
  const btn=document.querySelector('.btn-primary');
  if(btn) btn.disabled=!allDone;
  const lbl=document.querySelector('.progress-label');
  if(lbl) lbl.textContent=`${Object.keys(opState.answers).length}/${questions.length} points renseignés`;
}

function submitTPM(){
  const cat=getCat(opState.machineId);
  const questions=APP.questions[cat]||[];
  if(Object.keys(opState.answers).length!==questions.length) return;
  const hasIssue=Object.values(opState.answers).some(a=>a==='ko');
  const machineId=opState.machineId, operatorName=opState.operatorName, answers={...opState.answers};
  syncedWrite(()=>{
    const record={
      machineId, machineName:getMachineName(machineId),
      operator:operatorName, cat, questions:[...questions],
      time:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),
      date:today(), answers, anomaly:hasIssue
    };
    if(APP.todayDate!==today()){APP.todayDate=today();APP.todayRecords={};}
    APP.todayRecords[machineId]=record;
    APP.history.unshift(record);
    if(APP.history.length>200) APP.history=APP.history.slice(0,200);
  });
  opState.submitted=true;
  renderOperator();
}

function resetOp(){
  opState={machineId:getParam('machine')||'',operatorName:'',answers:{},submitted:false};
  renderOperator();
}

// ════════════════════════════════════════════
// VUE TABLEAU DE BORD
// ════════════════════════════════════════════
function renderDashboard(){
  const c=document.getElementById('db-content');
  const machines=APP.machines, records=APP.todayRecords;
  const done=machines.filter(m=>records[m.id]).length;
  const issues=machines.filter(m=>records[m.id]&&records[m.id].anomaly).length;
  const pct=machines.length?Math.round(done/machines.length*100):0;
  const now=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});

  let html=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">
    <div class="section-title">Tableau de bord</div>
    <div style="display:flex;align-items:center;gap:8px">
      ${isOnline?'<span class="live-badge">Sheets Live</span>':''}
      <span style="font-size:11px;color:var(--gray)">Màj ${now}</span>
    </div>
  </div>
  <div class="section-sub">État TPM du matin — ${today()}</div>

  ${issues>0?`<div class="alert-banner">
    <svg width="14" height="14" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    <div><strong>${issues} anomalie${issues>1?'s':''} signalée${issues>1?'s':''}</strong><br>
    ${machines.filter(m=>records[m.id]&&records[m.id].anomaly).map(m=>`${m.name}`).join(' · ')}</div>
  </div>`:''}

  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" style="color:var(--green)">${done}</div><div class="stat-lbl">Validées</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--gray)">${machines.length-done}</div><div class="stat-lbl">En attente</div></div>
    <div class="stat-card">
      <div class="stat-num" style="color:var(--yellow)">${pct}%</div>
      <div class="stat-lbl">Avancement</div>
      <div class="progress-bar" style="margin-top:6px"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
  </div>

  <div class="machine-grid">
    ${machines.map(m=>{
      const r=records[m.id];
      return `<div class="machine-tile ${r?(r.anomaly?'issue':'done'):''}">
        <div class="tile-name">${m.name}</div>
        <div style="margin-bottom:5px"><span class="badge badge-gray">${m.cat}</span></div>
        ${r?`<div class="tile-info"><span class="dot ${r.anomaly?'dot-red':'dot-green'}"></span> ${r.anomaly?'Anomalie':'Validé'}</div>
        <div class="tile-info" style="margin-top:2px">${r.operator} · ${r.time}</div>`
        :`<div class="tile-info"><span class="dot dot-gray"></span> En attente</div>`}
      </div>`;
    }).join('')}
  </div>

  ${done>0?`<div class="card">
    <div class="card-title">Récapitulatif du jour</div>
    <table class="tbl">
      <thead><tr><th>Machine</th><th>Opérateur</th><th>Heure</th><th>Statut</th></tr></thead>
      <tbody>
        ${machines.filter(m=>records[m.id]).map(m=>{
          const r=records[m.id];
          return `<tr><td style="font-weight:600">${m.name}</td><td>${r.operator}</td>
          <td style="font-variant-numeric:tabular-nums;color:var(--gray)">${r.time}</td>
          <td>${r.anomaly?`<span class="badge badge-red">Anomalie</span>`:`<span class="badge badge-green">OK</span>`}</td></tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`:`<div style="text-align:center;padding:28px 20px;color:var(--gray);font-size:13px">
    Aucune TPM validée pour l'instant.
  </div>`}`;

  c.innerHTML=html;
}

// VUE ADMIN
// ════════════════════════════════════════════
let adminState={locked:true,pass:'',addingMachine:false,newName:'',newCat:'Presse'};
const ADMIN_CODE='1234';

function renderAdmin(){
  const c=document.getElementById('admin-content');
  if(adminState.locked){
    c.innerHTML=`
    <div class="lock-screen">
      <div class="lock-box">
        <div class="lock-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div>
        <div class="section-title" style="margin-bottom:4px">Accès superviseur</div>
        <div class="section-sub">Code de démo : 1234</div>
        <label class="lbl">Code secret</label>
        <input type="password" placeholder="••••" id="admin-pass" oninput="adminState.pass=this.value" onkeydown="if(event.key==='Enter')tryAdmin()">
        <button class="btn btn-primary" style="margin-top:9px" onclick="tryAdmin()">Accéder</button>
        <div id="admin-err" style="color:var(--red);font-size:12px;margin-top:7px;display:none">Code incorrect</div>
      </div>
    </div>`;
    return;
  }
  const cats=Object.keys(APP.questions);
  c.innerHTML=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">
    <div class="section-title">Administration</div>
    <button class="btn btn-danger btn-sm" onclick="lockAdmin()">Verrouiller</button>
  </div>
  <div class="section-sub">Gestion des machines et des contrôles</div>

  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div class="card-title" style="margin-bottom:0">Parc machine (${APP.machines.length})</div>
      <button class="btn btn-secondary btn-sm" onclick="toggleAddMachine()">+ Ajouter</button>
    </div>
    ${adminState.addingMachine?`
    <div style="background:var(--yellow-dim);border:1px solid rgba(245,197,24,.2);border-radius:9px;padding:13px;margin-bottom:12px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px">
        <div><label class="lbl" style="margin-top:0;color:var(--yellow)">Nom</label>
        <input type="text" placeholder="Ex: Presse 12" id="new-mname" value="${adminState.newName}" oninput="adminState.newName=this.value"></div>
        <div><label class="lbl" style="margin-top:0;color:var(--yellow)">Catégorie</label>
        <select id="new-mcat" onchange="adminState.newCat=this.value">${cats.map(c2=>`<option ${adminState.newCat===c2?'selected':''}>${c2}</option>`).join('')}</select></div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="addMachine()">Créer + QR Code</button>
    </div>`:''}
    <table class="tbl">
      <thead><tr><th>Machine</th><th>Catégorie</th><th>Aujourd'hui</th><th>QR</th></tr></thead>
      <tbody>
        ${APP.machines.map(m=>{
          const r=APP.todayRecords[m.id];
          return `<tr>
            <td style="font-weight:600">${m.name}</td>
            <td><span class="badge badge-yellow">${m.cat}</span></td>
            <td>${r?(r.anomaly?`<span class="badge badge-red">⚠</span>`:`<span class="badge badge-green">✓</span>`):`<span class="badge badge-gray">—</span>`}</td>
            <td><button class="btn btn-secondary btn-sm" onclick="showQR('${m.id}')">QR</button></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>

  <div class="card">
    <div class="card-title">Questions de contrôle</div>
    ${cats.map(cat=>`
    <div style="margin-bottom:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
        <span class="badge badge-yellow">${cat}</span>
        <button class="btn btn-secondary btn-sm" onclick="addQuestion('${cat}')">+ Ajouter</button>
      </div>
      ${APP.questions[cat].map((q,i)=>`
      <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--text)">
        <span style="flex:1;padding-right:7px">${q}</span>
        <button onclick="removeQ('${cat}',${i})" style="background:none;border:none;color:var(--gray2);cursor:pointer;font-size:17px;padding:2px 5px;border-radius:5px">×</button>
      </div>`).join('')}
    </div>`).join('')}
  </div>

  <div class="card">
    <div class="card-title">Données du jour</div>
    <p style="font-size:13px;color:var(--gray);margin-bottom:10px">${Object.keys(APP.todayRecords).length} TPM validée(s) aujourd'hui — stockées sur Google Sheets.</p>
    <button class="btn btn-danger btn-sm" onclick="resetDay()">Remettre à zéro (démo)</button>
  </div>`;
}

function tryAdmin(){
  const input=document.getElementById('admin-pass');
  const val=input?input.value:adminState.pass;
  if(val===ADMIN_CODE){adminState.locked=false;renderAdmin();}
  else{const err=document.getElementById('admin-err');if(err)err.style.display='block';}
}
function lockAdmin(){adminState.locked=true;renderAdmin();}
function toggleAddMachine(){adminState.addingMachine=!adminState.addingMachine;renderAdmin();}
function addMachine(){
  const name=document.getElementById('new-mname')?.value||adminState.newName;
  if(!name.trim()){alert('Entrez un nom');return;}
  const cat=adminState.newCat;
  adminState.newName='';adminState.addingMachine=false;
  renderAdmin();
  let id;
  syncedWrite(()=>{
    const prefix=cat.substring(0,2).toUpperCase();
    const count=APP.machines.filter(m=>m.cat===cat).length+1;
    id=`${prefix}-${String(count).padStart(2,'0')}`;
    APP.machines.push({id,name:name.trim(),cat});
  }).then(()=>{
    renderAdmin();
    showQR(id);
  });
}
function addQuestion(cat){
  const q=prompt(`Nouvelle question pour "${cat}" :`);
  if(q&&q.trim()){
    syncedWrite(()=>{ if(!APP.questions[cat]) APP.questions[cat]=[]; APP.questions[cat].push(q.trim()); }).then(renderAdmin);
  }
}
function removeQ(cat,i){
  if(confirm('Supprimer ce point de contrôle ?')){
    syncedWrite(()=>{ APP.questions[cat].splice(i,1); }).then(renderAdmin);
  }
}
function resetDay(){
  if(confirm('Remettre à zéro toutes les TPM ?')){
    syncedWrite(()=>{ APP.todayRecords={}; }).then(renderAdmin);
  }
}

// ════════════════════════════════════════════
// QR CODE — texte simple, pas de dépendance externe
// ════════════════════════════════════════════
function showQR(machineId){
  const m=APP.machines.find(x=>x.id===machineId);
  if(!m) return;
  const url=window.location.origin+window.location.pathname+'?machine='+machineId;
  document.getElementById('qr-modal-title').textContent=m.name;
  document.getElementById('qr-modal-sub').textContent=m.cat+' — '+machineId;
  document.getElementById('qr-modal-url').textContent=url;
  const inner=document.getElementById('qr-modal-inner');
  inner.innerHTML='';
  try{
    const qr=qrcode(0,'M');
    qr.addData(url);
    qr.make();
    inner.innerHTML=qr.createImgTag(6,8);
    const img=inner.querySelector('img');
    if(img){img.style.display='block';window.__lastQRDataUrl=img.src;window.__lastQRName=m.name;}
  }catch(e){
    inner.innerHTML='<div style="font-size:11px;color:#c00;padding:18px;text-align:center;max-width:200px">Erreur génération QR<br>(vérifiez la connexion internet pour charger la librairie)</div>';
    window.__lastQRDataUrl=null;
  }
  document.getElementById('qr-modal').classList.add('open');
}
function downloadQR(){
  if(!window.__lastQRDataUrl){alert('QR non disponible');return;}
  const a=document.createElement('a');
  a.href=window.__lastQRDataUrl;
  a.download='QR-'+(window.__lastQRName||'machine')+'.gif';
  document.body.appendChild(a);
  a.click();
  a.remove();
}
function closeQR(){document.getElementById('qr-modal').classList.remove('open');}
document.getElementById('qr-modal').addEventListener('click',function(e){if(e.target===this)closeQR();});

fetchFromSheet();
if(getParam('machine')){
  setTimeout(()=>{
    const sel=document.getElementById('op-name-select');
    if(sel){sel.scrollIntoView({behavior:'smooth',block:'center'});sel.focus();}

}
